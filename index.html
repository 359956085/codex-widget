<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex CLI 额度小组件</title>
  </head>
  <body data-state="loading">
    <main class="widget" aria-live="polite">
      <header class="titlebar">
        <div class="brand">
          <span id="trafficLight" class="traffic-light loading" aria-hidden="true"></span>
          <div class="brand-copy">
            <span id="brandName" class="brand-name">Codex CLI 额度</span>
            <span id="stateText" class="brand-state">读取中</span>
          </div>
        </div>
        <div class="window-actions">
          <button id="modeBtn" class="icon-button" type="button" title="悬浮球" aria-label="悬浮球">
            <i data-lucide="circle-dot"></i>
          </button>
          <button id="settingsBtn" class="icon-button" type="button" title="设置" aria-label="设置">
            <i data-lucide="settings"></i>
          </button>
          <button id="pinBtn" class="icon-button active" type="button" title="取消置顶" aria-label="取消置顶">
            <i data-lucide="pin"></i>
          </button>
          <button id="refreshBtn" class="icon-button" type="button" title="刷新" aria-label="刷新">
            <i data-lucide="refresh-cw"></i>
          </button>
          <button id="minimizeBtn" class="icon-button" type="button" title="隐藏" aria-label="隐藏">
            <i data-lucide="minus"></i>
          </button>
          <button id="closeBtn" class="icon-button danger" type="button" title="退出" aria-label="退出">
            <i data-lucide="x"></i>
          </button>
        </div>
      </header>

      <section class="content">
        <div id="liquidMeter" class="liquid-meter" aria-label="Codex 剩余额度">
          <div id="gaugeLayer" class="gauge-layer" aria-hidden="true"></div>
          <div class="glass-rim"></div>
          <div id="liquidFill" class="liquid-fill">
            <div class="wave wave-one"></div>
            <div class="wave wave-two"></div>
          </div>
          <div class="shine"></div>
          <div class="meter-copy">
            <strong id="remaining">--%</strong>
            <span id="remainingLabel">剩余</span>
          </div>
        </div>

        <div class="quota-panel">
          <div class="quota-card primary">
            <span class="quota-icon" data-quota-icon="primary" aria-hidden="true">
              <i data-lucide="clock-3"></i>
            </span>
            <span id="primaryLabel">5小时窗口</span>
            <strong id="primaryText">--</strong>
          </div>
          <div class="quota-card">
            <span class="quota-icon" data-quota-icon="secondary" aria-hidden="true">
              <i data-lucide="calendar-days"></i>
            </span>
            <span id="secondaryLabel">7天窗口</span>
            <strong id="secondaryText">--</strong>
          </div>
          <div class="quota-card slim">
            <span class="quota-icon" data-quota-icon="plan" aria-hidden="true">
              <i data-lucide="crown"></i>
            </span>
            <span id="planLabel">套餐</span>
            <strong id="planText">--</strong>
          </div>
        </div>
      </section>

      <footer class="status">
        <span id="statusIcon" class="status-icon" aria-hidden="true">
          <i data-lucide="refresh-cw"></i>
        </span>
        <span id="statusDot" class="status-dot loading"></span>
        <span id="statusText">正在通过 Codex CLI 读取额度...</span>
      </footer>

      <section id="settingsPanel" class="settings-panel" data-no-drag hidden aria-label="设置">
        <div class="settings-head">
          <strong id="settingsTitle">设置</strong>
          <button id="settingsCloseBtn" class="icon-button" type="button" title="关闭" aria-label="关闭">
            <i data-lucide="x"></i>
          </button>
        </div>

        <div class="settings-scroll">
          <label class="settings-field">
            <span id="codexPathLabel">Codex CLI 路径</span>
            <div class="path-control">
              <input id="codexPathInput" class="settings-input" type="text" data-no-drag spellcheck="false" />
              <button id="chooseCodexBtn" class="icon-button" type="button" title="选择 Codex CLI (codex.exe)" aria-label="选择 Codex CLI (codex.exe)">
                <i data-lucide="folder-open"></i>
              </button>
            </div>
          </label>

          <div class="settings-field settings-row">
            <div class="settings-copy">
              <span id="autoUpdateLabel">自动更新</span>
              <small id="autoUpdateHint">依赖 GitHub，网络不可达时可能需要配置代理。</small>
            </div>
            <label class="switch-control" data-no-drag>
              <input id="autoUpdateSwitch" type="checkbox" data-no-drag checked />
              <span class="switch-track" aria-hidden="true"></span>
            </label>
          </div>

          <div class="settings-field settings-row">
            <div class="settings-copy">
              <span id="autoStartLabel">开机自启</span>
              <small id="autoStartHint">登录系统后自动启动本应用，仅对当前用户生效。</small>
            </div>
            <label class="switch-control" data-no-drag>
              <input id="autoStartSwitch" type="checkbox" data-no-drag />
              <span class="switch-track" aria-hidden="true"></span>
            </label>
          </div>

          <label class="settings-field">
            <span id="updateProxyLabel">更新代理</span>
            <input id="updateProxyInput" class="settings-input" type="text" data-no-drag spellcheck="false" />
            <small id="updateProxyHint" class="field-hint">仅用于 GitHub 自动更新，不影响 Codex CLI。</small>
          </label>

          <label class="settings-field">
            <span id="refreshIntervalLabel">刷新分钟</span>
            <input id="refreshIntervalInput" class="settings-input" type="number" min="1" max="1440" step="1" data-no-drag />
          </label>

          <label class="settings-field">
            <span id="themeLabel">主题</span>
            <select id="themeSelect" class="settings-input settings-select" data-no-drag></select>
          </label>

          <label class="settings-field">
            <span id="languageLabel">语言</span>
            <select id="localeSelect" class="settings-input settings-select" data-no-drag>
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </label>
        </div>

        <div class="settings-actions">
          <button id="cancelSettingsBtn" class="secondary-button" type="button" data-no-drag>取消</button>
          <button id="saveSettingsBtn" class="primary-button" type="button" data-no-drag>
            <span id="saveSettingsText">保存</span>
          </button>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
